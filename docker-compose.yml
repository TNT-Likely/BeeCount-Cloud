services:
  beecount-cloud:
    image: sunxiao0721/beecount-cloud:latest
    # 贡献者本地开发:注释掉 image、启用 build
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # 必须改成 32+ bytes 随机串,否则服务启动会拒绝运行。
      JWT_SECRET: change-me-in-production-at-least-32-bytes
      # 非同域部署时改成对外可访问的地址(逗号分隔多个)。
      CORS_ORIGINS: http://localhost:8080
      # 其他变量(DATABASE_URL / BACKUP_STORAGE_DIR / ATTACHMENT_STORAGE_DIR /
      # ALLOW_APP_RW_SCOPES)都有镜像内置的生产默认值,按需覆盖即可。
    ports:
      - "8080:8080"
    volumes:
      # 一个 volume 装全部数据:SQLite DB + 附件 + 备份归档 + 头像。
      - beecount_data:/data

volumes:
  beecount_data:
