name: ✨ 功能建议(中文)
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议!**先说清楚要解决的"问题"比"方案"更重要** —— 这样我们能判断要不要做、怎么做最合适。

  - type: checkboxes
    id: prereqs
    attributes:
      label: 前置检查
      options:
        - label: 我已搜索过 [已有 Issues / Discussions](https://github.com/TNT-Likely/BeeCount-Cloud/issues?q=is%3Aissue) 没有重复
          required: true
        - label: 这个功能跟 **Cloud 服务端 / Web 控制台** 相关(纯 App 功能请去 App 仓库)
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 遇到的问题 / 使用场景
      description: 描述你现在的使用场景,遇到了什么不方便。**不要直接说"请加 XX 功能"**,先说问题
      placeholder: |
        例:
        我和家人共用一个账本,但我们在不同城市工作。
        每次对账都得微信截图发一遍,想在 Web 上能共享账本给另一个注册用户。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的解决方案
      description: 理想中它应该怎么工作
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案(非必填)
      description: 你还考虑过哪些其他做法?为什么它们不够好?

  - type: textarea
    id: more
    attributes:
      label: 参考资料 / 补充(非必填)
      description: 类似功能在其他产品上的例子、设计稿、数据量级等

  - type: checkboxes
    id: contribution
    attributes:
      label: 你愿意贡献代码吗?
      options:
        - label: 我愿意提交 PR 实现这个功能(会先跟 maintainer 对齐方案再动手)
