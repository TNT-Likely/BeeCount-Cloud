name: ci

on:
  # 按用户要求：push / PR 都不自动跑，避免烧 Actions 分钟数。只允许手动触发。
  # tag push 由 release.yml 处理（带 docker buildx + gh release）；ci.yml
  # 这里负责"代码质量 gate"，PR 合并前需要的话自己去 Actions 页面手动 Run。
  workflow_dispatch:

jobs:
  backend-check-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ruff
        run: ruff check src tests alembic
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest -q

  backend-check-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: beecount
          POSTGRES_USER: beecount
          POSTGRES_PASSWORD: beecount
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U beecount -d beecount"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://beecount:beecount@localhost:5432/beecount
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Migrate
        run: alembic upgrade head
      - name: Ruff
        run: ruff check src tests alembic
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest -q

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: pnpm install --no-frozen-lockfile
        working-directory: frontend
      - name: Build
        run: pnpm -C apps/web build
        working-directory: frontend
      - name: Unit Test
        run: pnpm -C apps/web test:unit
        working-directory: frontend

  # 注：docker-build / docker-release 已移除。
  #   - docker-build：原先每次 PR / main push 都跑全量 docker build，一次就
  #     烧掉大量 Actions 分钟数。Dockerfile 的正确性在 release 时会被 verify。
  #   - docker-release：release.yml 已经在 tag + workflow_dispatch 时跑 docker
  #     buildx 推镜像（Docker Hub + GHCR 按需），ci.yml 里重复一份纯浪费。
  # 如果后续想在 PR 验证镜像可构建，加一个 labels/paths 过滤或 manual-only
  # 的 smoke check，不要无条件跑。
